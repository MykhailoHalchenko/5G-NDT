app:
  name: "5G Network Digital Twin"
  version: "0.1.0"
  debug: true
  log_level: "DEBUG"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

neo4j:
  uri: "bolt://localhost:7687"
  user: "neo4j"
  password: "password"
  database: "neo4j"

influxdb:
  url: "http://localhost:8086"
  token: "dev-token"
  org: "kai-ndt"
  bucket: "5g-telemetry"

kafka:
  bootstrap_servers:
    - "localhost:9092"
  group_id: "ndt-dev-consumer"
  topics:
    telemetry_raw: "ndt.telemetry.raw"
    topology_events: "ndt.topology.events"

discovery:
  poll_interval_seconds: 60
  timeout_seconds: 10
  protocols:
    - "NETCONF"
    - "gNMI"
    - "REST"
