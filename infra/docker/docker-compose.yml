version: "3.9"

services:
  # ── 5G NDT API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: ndt-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=dev-token
      - INFLUXDB_ORG=kai-ndt
      - INFLUXDB_BUCKET=5g-telemetry
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - LOG_LEVEL=DEBUG
    depends_on:
      neo4j:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - ndt-network

  # ── Neo4j (topology graph DB) ───────────────────────────────────────────────
  neo4j:
    image: neo4j:5.14
    container_name: ndt-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - ndt-network

  # ── InfluxDB (time-series DB) ───────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: ndt-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=kai-ndt
      - DOCKER_INFLUXDB_INIT_BUCKET=5g-telemetry
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=dev-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - ndt-network

  # ── Zookeeper (Kafka dependency) ────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ndt-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    restart: unless-stopped
    networks:
      - ndt-network

  # ── Apache Kafka (message broker) ──────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ndt-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
    restart: unless-stopped
    networks:
      - ndt-network

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  neo4j_data:
  neo4j_logs:
  influxdb_data:
  zookeeper_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  ndt-network:
    driver: bridge
