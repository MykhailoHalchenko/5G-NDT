apiVersion: apps/v1
kind: Deployment
metadata:
  name: ndt-api
  namespace: 5g-ndt
  labels:
    app: ndt-api
    component: api
    version: "0.1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ndt-api
  template:
    metadata:
      labels:
        app: ndt-api
    spec:
      containers:
        - name: ndt-api
          image: 5g-ndt:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: NEO4J_URI
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: neo4j-uri
            - name: NEO4J_USER
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: neo4j-user
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: neo4j-password
            - name: INFLUXDB_URL
              valueFrom:
                configMapKeyRef:
                  name: ndt-config
                  key: influxdb-url
            - name: INFLUXDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ndt-secrets
                  key: influxdb-token
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ndt-api
  namespace: 5g-ndt
spec:
  selector:
    app: ndt-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Namespace
metadata:
  name: 5g-ndt
